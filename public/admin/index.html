<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Admin pages should NOT be indexed by search engines -->
  <title>Content Manager · APS MAJESTE</title>
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#1a1614">

  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
</head>
<body>
  <!--
    Decap CMS injects its own UI into <div id="nc-root"></div> automatically.

    Setup:
      1. Create a GitHub OAuth App (see README → Admin section).
      2. Edit /admin/config.yml and set `repo`, `app_id` (OAuth client ID).
      3. Visit /admin/ and sign in with GitHub.
      4. Edit products — every save commits to GitHub and triggers a Pages rebuild.
  -->

  <!-- Decap CMS — must be in <body> so it can initialize after the DOM is ready -->
  <script src="https://unpkg.com/decap-cms@3.6.0/dist/decap-cms.js"></script>
</body>
</html>
